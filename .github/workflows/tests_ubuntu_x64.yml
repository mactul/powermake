name: Run tests on ubuntu x64


on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  tests:
    name: Install toolchains and run tests on ubuntu x64
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@master
    - name: Set up Python 3
      uses: actions/setup-python@v3
      with:
        python-version: '3.x'
    - name: Install mypy & colorama & coverage
      run: >-
        python -m pip install colorama coverage mypy types-colorama
    - name: Update
      run: >-
        sudo apt-get update
    - name: install mingw & clang
      run: >-
        sudo apt-get install -y mingw-w64 clang
    - name: what the actual fuck ?
      run: >-  # This will be removed by the installation of aarch64-linux-gnu-gcc, but some dependencies will be kept. I should search what exact dependencies I need, but at this point the debian/ubuntu packaging makes me crazy...
        sudo apt-get install -y g++-multilib
    - name: install aarch64-linux-gnu-gcc
      run: >-
        sudo apt-get install -y g++-aarch64-linux-gnu
    - name: install gcc libs for i386
      run: >-
        sudo dpkg --add-architecture i386 && sudo apt update && sudo apt-get install -y linux-libc-dev:i386
    - name: install nasm & wine
      run: |
        sudo apt-get install -y nasm wine wine-binfmt binfmt-support
        sudo update-binfmts --enable wine
    - name: run tests
      run: >-
        ./tests/tests.sh
